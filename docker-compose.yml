version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: luggagetrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-luggagetrack}
      POSTGRES_USER:     ${POSTGRES_USER:-luggagetrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luggagetrack123}
    volumes:
      - pgdata:/var/lib/postgresql/data          # persistent storage
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - luggagetrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luggagetrack} -d ${POSTGRES_DB:-luggagetrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Node.js / Express Backend API ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: luggagetrack_api
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      PORT:              3001
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-luggagetrack}
      POSTGRES_USER:     ${POSTGRES_USER:-luggagetrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luggagetrack123}
      JWT_SECRET:        ${JWT_SECRET:-change-this-secret-in-production}
      CORS_ORIGIN:       ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - luggagetrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Nginx + React Frontend ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: luggagetrack_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"        # used when SSL/Certbot is active
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro        # Let's Encrypt certs
      - ./certbot/www:/var/www/certbot:ro          # ACME challenge
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - luggagetrack-net

  # ── Certbot (Let's Encrypt SSL) ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: luggagetrack_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Certbot renews certs every 12 hours — exits immediately if not due
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot
        -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    profiles:
      - ssl           # only started when --profile ssl is used

volumes:
  pgdata:
    name: luggagetrack_pgdata
    driver: local

networks:
  luggagetrack-net:
    driver: bridge
